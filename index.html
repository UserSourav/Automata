<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Automata</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080c14;
    --surface: #0d1422;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #4a5568;
    --c0: #334155;
    --c1: #f97316;
    --c2: #eab308;
    --c3: #22c55e;
    --c4: #06b6d4;
    --glow0: rgba(249,115,22,0.3);
    --glow1: rgba(234,179,8,0.3);
    --glow2: rgba(34,197,94,0.3);
    --glow3: rgba(6,182,212,0.3);
    --active-color: #e8eaf0;
    --active-glow: rgba(232,234,240,0.15);
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
  }

  /* Header */
  .header {
    margin-bottom: 32px;
  }

  .header-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .header h1 span {
    color: var(--muted);
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  /* Input section */
  .input-section {
    padding: 28px 28px 24px;
    border-bottom: 1px solid var(--border);
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-wrapper input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 52px 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.05em;
  }

  .input-wrapper input:focus {
    border-color: rgba(255,255,255,0.15);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .input-wrapper input::placeholder {
    color: var(--muted);
    font-size: 13px;
  }

  .eye-btn {
    position: absolute;
    right: 14px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    padding: 4px;
    transition: color 0.2s;
    user-select: none;
  }

  .eye-btn:hover { color: var(--text); }

  /* Strength bar */
  .strength-section {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.4s ease;
    background: var(--c0);
  }

  .strength-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    min-width: 80px;
    text-align: right;
    color: var(--muted);
    transition: color 0.3s;
  }

  /* Criteria checklist */
  .criteria {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .criterion {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    transition: color 0.3s;
    font-family: 'Space Mono', monospace;
  }

  .criterion.met { color: var(--text); }

  .criterion-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }

  .criterion.met .criterion-dot {
    background: var(--c3);
    box-shadow: 0 0 6px var(--glow2);
  }

  /* Automata section */
  .automata-section {
    padding: 24px 28px 28px;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .automata-svg-wrapper {
    width: 100%;
  }

  svg.automata {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* SVG state styles */
  .state-ring {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 1.5;
    transition: stroke 0.35s, stroke-width 0.35s;
  }

  .state-bg {
    fill: rgba(255,255,255,0.03);
    transition: fill 0.35s;
  }

  .state-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    fill: rgba(255,255,255,0.3);
    text-anchor: middle;
    dominant-baseline: middle;
    transition: fill 0.35s;
    letter-spacing: 0.05em;
  }

  .state-sublabel {
    font-family: 'Space Mono', monospace;
    font-size: 7.5px;
    fill: rgba(255,255,255,0.18);
    text-anchor: middle;
    dominant-baseline: middle;
    transition: fill 0.35s;
  }

  .state-group.active .state-ring {
    stroke-width: 2.5;
  }

  .state-group.active .state-bg {
    /* dynamic via JS */
  }

  .state-group.active .state-label {
    fill: #fff;
  }

  .state-group.active .state-sublabel {
    fill: rgba(255,255,255,0.7);
  }

  /* Accept state double ring */
  .accept-ring {
    fill: none;
    stroke: rgba(255,255,255,0.04);
    stroke-width: 1;
    transition: stroke 0.35s;
  }

  .state-group.active .accept-ring {
    stroke: rgba(255,255,255,0.2);
  }

  /* Arrows */
  .arrow-path {
    fill: none;
    stroke: rgba(255,255,255,0.1);
    stroke-width: 1.5;
    transition: stroke 0.35s, stroke-dashoffset 0.5s;
    marker-end: url(#arrowhead);
    stroke-dasharray: 120;
    stroke-dashoffset: 0;
  }

  .arrow-path.active {
    stroke-dashoffset: 120;
    animation: dashFlow 0.6s ease forwards;
  }

  @keyframes dashFlow {
    from { stroke-dashoffset: 120; }
    to { stroke-dashoffset: 0; }
  }

  .arrow-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    fill: rgba(255,255,255,0.2);
    text-anchor: middle;
    transition: fill 0.35s;
  }

  .arrow-label.active {
    fill: rgba(255,255,255,0.6);
  }

  /* Copy button */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .action-btn {
    flex: 1;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .action-btn:hover {
    background: rgba(255,255,255,0.08);
    color: var(--text);
    border-color: rgba(255,255,255,0.15);
  }

  .action-btn.success {
    color: var(--c3);
    border-color: var(--c3);
    background: rgba(34,197,94,0.08);
  }

  /* Footer */
  .footer {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-note {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .footer-links {
    display: flex;
    gap: 12px;
  }

  .footer-links a {
    color: var(--muted);
    font-size: 14px;
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--text); }

  /* Entropy display */
  .entropy-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 28px;
    border-top: 1px solid var(--border);
    background: rgba(255,255,255,0.015);
  }

  .entropy-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .entropy-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
    transition: color 0.3s;
  }

  /* Pulse animation for active state */
  @keyframes statePulse {
    0% { r: 28; opacity: 0.6; }
    100% { r: 40; opacity: 0; }
  }

  .pulse-ring {
    fill: none;
    stroke-width: 1;
    opacity: 0;
    pointer-events: none;
  }

  .state-group.active .pulse-ring {
    animation: pulseExpand 1.5s ease-out infinite;
  }

  @keyframes pulseExpand {
    0% { r: 28; opacity: 0.5; stroke-width: 1.5; }
    100% { r: 48; opacity: 0; stroke-width: 0.5; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <div class="header-tag">Finite Automata / DFA Simulation</div>
    <h1>Password <span>Strength</span><br>Checker</h1>
  </div>

  <div class="card">
    <!-- Input -->
    <div class="input-section">
      <div class="input-wrapper">
        <input type="password" id="passwordInput" placeholder="Enter your password..." autocomplete="new-password" oninput="analyze()" spellcheck="false">
        <button class="eye-btn" id="eyeBtn" onclick="toggleVisibility()" title="Toggle visibility">👁</button>
      </div>
      <div class="strength-section">
        <div class="bar-track">
          <div class="bar-fill" id="barFill"></div>
        </div>
        <div class="strength-label" id="strengthLabel">—</div>
      </div>
    </div>

    <!-- Criteria -->
    <div class="criteria">
      <div class="criterion" id="c-upper">
        <div class="criterion-dot"></div>Uppercase letter
      </div>
      <div class="criterion" id="c-lower">
        <div class="criterion-dot"></div>Lowercase letter
      </div>
      <div class="criterion" id="c-number">
        <div class="criterion-dot"></div>Number (0–9)
      </div>
      <div class="criterion" id="c-symbol">
        <div class="criterion-dot"></div>Special symbol
      </div>
      <div class="criterion" id="c-length">
        <div class="criterion-dot"></div>Min 8 characters
      </div>
      <div class="criterion" id="c-long">
        <div class="criterion-dot"></div>12+ characters
      </div>
    </div>

    <!-- Entropy -->
    <div class="entropy-row">
      <span class="entropy-label">Entropy</span>
      <span class="entropy-value" id="entropyVal">— bits</span>
    </div>

    <!-- Automata -->
    <div class="automata-section">
      <div class="section-label">DFA State Transition</div>
      <div class="automata-svg-wrapper">
        <svg class="automata" viewBox="0 0 500 160" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
              <polygon points="0 0, 7 3.5, 0 7" fill="rgba(255,255,255,0.15)" id="arrowFill"/>
            </marker>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <!-- Arrows -->
          <!-- q0 → q1 -->
          <path id="arrow01" class="arrow-path" d="M 88 80 L 152 80"/>
          <text class="arrow-label" id="lbl01" x="120" y="72">upper</text>

          <!-- q1 → q2 -->
          <path id="arrow12" class="arrow-path" d="M 208 80 L 272 80"/>
          <text class="arrow-label" id="lbl12" x="240" y="72">digit</text>

          <!-- q2 → q3 -->
          <path id="arrow23" class="arrow-path" d="M 328 80 L 392 80"/>
          <text class="arrow-label" id="lbl23" x="360" y="72">symbol</text>

          <!-- q3 → q4 (length) -->
          <path id="arrow34" class="arrow-path" d="M 448 80 L 480 80"/>
          <text class="arrow-label" id="lbl34" x="464" y="72">len≥8</text>

          <!-- States -->
          <!-- q0 -->
          <g class="state-group" id="sg0">
            <circle class="pulse-ring" cx="60" cy="80" r="28" stroke="rgba(255,255,255,0.3)" id="pulse0"/>
            <circle class="state-bg" cx="60" cy="80" r="28" id="bg0"/>
            <circle class="state-ring" cx="60" cy="80" r="28" id="ring0"/>
            <text class="state-label" x="60" y="76" id="lq0">q₀</text>
            <text class="state-sublabel" x="60" y="88" id="sq0">start</text>
          </g>

          <!-- q1 -->
          <g class="state-group" id="sg1">
            <circle class="pulse-ring" cx="180" cy="80" r="28" stroke="rgba(255,255,255,0.3)" id="pulse1"/>
            <circle class="state-bg" cx="180" cy="80" r="28" id="bg1"/>
            <circle class="state-ring" cx="180" cy="80" r="28" id="ring1"/>
            <text class="state-label" x="180" y="76" id="lq1">q₁</text>
            <text class="state-sublabel" x="180" y="88" id="sq1">upper</text>
          </g>

          <!-- q2 -->
          <g class="state-group" id="sg2">
            <circle class="pulse-ring" cx="300" cy="80" r="28" stroke="rgba(255,255,255,0.3)" id="pulse2"/>
            <circle class="state-bg" cx="300" cy="80" r="28" id="bg2"/>
            <circle class="state-ring" cx="300" cy="80" r="28" id="ring2"/>
            <text class="state-label" x="300" y="76" id="lq2">q₂</text>
            <text class="state-sublabel" x="300" y="88" id="sq2">+digit</text>
          </g>

          <!-- q3 -->
          <g class="state-group" id="sg3">
            <circle class="pulse-ring" cx="420" cy="80" r="28" stroke="rgba(255,255,255,0.3)" id="pulse3"/>
            <circle class="state-bg" cx="420" cy="80" r="28" id="bg3"/>
            <circle class="state-ring" cx="420" cy="80" r="28" id="ring3"/>
            <text class="state-label" x="420" y="76" id="lq3">q₃</text>
            <text class="state-sublabel" x="420" y="88" id="sq3">+symbol</text>
          </g>

          <!-- q4 (final/accepting) — shown as label at right edge with double ring -->
          <!-- We embed q4 info inside q3's sublabel update in JS since 5 states don't fit -->

          <!-- State index labels below -->
          <text font-family="'Space Mono',monospace" font-size="8" fill="rgba(255,255,255,0.1)" x="60" y="120" text-anchor="middle">WEAK</text>
          <text font-family="'Space Mono',monospace" font-size="8" fill="rgba(255,255,255,0.1)" x="180" y="120" text-anchor="middle">FAIR</text>
          <text font-family="'Space Mono',monospace" font-size="8" fill="rgba(255,255,255,0.1)" x="300" y="120" text-anchor="middle">STRONG</text>
          <text font-family="'Space Mono',monospace" font-size="8" fill="rgba(255,255,255,0.1)" x="420" y="120" text-anchor="middle">ACCEPT</text>

          <!-- Accept double ring on q3 -->
          <circle class="accept-ring" id="acceptRing" cx="420" cy="80" r="22"/>
        </svg>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button class="action-btn" id="copyBtn" onclick="copyPassword()">Copy Password</button>
        <button class="action-btn" onclick="generatePassword()">Generate Strong</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-note">DFA simulation · 4-state model</span>
    <div class="footer-links">
      <a href="mailto:ss6015@srmist.edu.in" title="Email">✉</a>
      <a href="https://www.linkedin.com/in/usersourav" target="_blank" title="LinkedIn">in</a>
      <a href="https://github.com/Usersourav" target="_blank" title="GitHub">⌥</a>
    </div>
  </div>
</div>

<script>
  // ─── State colors ────────────────────────────────────────────
  const STATE_COLORS = [
    { stroke: '#f97316', bg: 'rgba(249,115,22,0.12)', pulse: 'rgba(249,115,22,0.4)', arrow: 'rgba(249,115,22,0.7)' },
    { stroke: '#eab308', bg: 'rgba(234,179,8,0.12)',  pulse: 'rgba(234,179,8,0.4)',  arrow: 'rgba(234,179,8,0.7)'  },
    { stroke: '#22c55e', bg: 'rgba(34,197,94,0.12)',  pulse: 'rgba(34,197,94,0.4)',  arrow: 'rgba(34,197,94,0.7)'  },
    { stroke: '#06b6d4', bg: 'rgba(6,182,212,0.12)',  pulse: 'rgba(6,182,212,0.4)',  arrow: 'rgba(6,182,212,0.7)'  },
  ];

  const STRENGTH_LABELS = ['WEAK', 'FAIR', 'STRONG', 'VERY STRONG'];
  const BAR_WIDTHS = ['20%', '45%', '72%', '100%'];
  const BAR_COLORS = ['#f97316', '#eab308', '#22c55e', '#06b6d4'];

  let visible = false;

  function toggleVisibility() {
    visible = !visible;
    const inp = document.getElementById('passwordInput');
    inp.type = visible ? 'text' : 'password';
    document.getElementById('eyeBtn').textContent = visible ? '🙈' : '👁';
  }

  function calcEntropy(pwd) {
    if (!pwd) return 0;
    let pool = 0;
    if (/[a-z]/.test(pwd)) pool += 26;
    if (/[A-Z]/.test(pwd)) pool += 26;
    if (/[0-9]/.test(pwd)) pool += 10;
    if (/[^a-zA-Z0-9]/.test(pwd)) pool += 32;
    return Math.floor(pwd.length * Math.log2(pool || 1));
  }

  function analyze() {
    const pwd = document.getElementById('passwordInput').value;

    const hasUpper  = /[A-Z]/.test(pwd);
    const hasLower  = /[a-z]/.test(pwd);
    const hasNumber = /[0-9]/.test(pwd);
    const hasSymbol = /[^a-zA-Z0-9]/.test(pwd);
    const hasLen8   = pwd.length >= 8;
    const hasLen12  = pwd.length >= 12;

    // Criteria dots
    setCriterion('c-upper',  hasUpper);
    setCriterion('c-lower',  hasLower);
    setCriterion('c-number', hasNumber);
    setCriterion('c-symbol', hasSymbol);
    setCriterion('c-length', hasLen8);
    setCriterion('c-long',   hasLen12);

    // DFA state: 0→1→2→3 based on cumulative criteria
    let state = 0;
    if (hasUpper) state = 1;
    if (hasUpper && hasNumber) state = 2;
    if (hasUpper && hasNumber && hasSymbol && hasLen8) state = 3;

    updateAutomata(state, pwd.length === 0);

    // Bar
    const bar = document.getElementById('barFill');
    if (!pwd) {
      bar.style.width = '0%';
      document.getElementById('strengthLabel').textContent = '—';
      document.getElementById('strengthLabel').style.color = 'var(--muted)';
    } else {
      bar.style.width = BAR_WIDTHS[state];
      bar.style.background = BAR_COLORS[state];
      document.getElementById('strengthLabel').textContent = STRENGTH_LABELS[state];
      document.getElementById('strengthLabel').style.color = BAR_COLORS[state];
    }

    // Entropy
    const bits = calcEntropy(pwd);
    document.getElementById('entropyVal').textContent = pwd ? `${bits} bits` : '— bits';
  }

  function setCriterion(id, met) {
    const el = document.getElementById(id);
    el.classList.toggle('met', met);
  }

  function updateAutomata(activeState, empty) {
    const totalStates = 4;
    const arrows = ['arrow01', 'arrow12', 'arrow23', 'arrow34'];
    const labels  = ['lbl01',   'lbl12',   'lbl23',   'lbl34'];

    // Reset all
    for (let i = 0; i < totalStates; i++) {
      const sg = document.getElementById(`sg${i}`);
      sg.classList.remove('active');
      document.getElementById(`bg${i}`).style.fill = 'rgba(255,255,255,0.03)';
      document.getElementById(`ring${i}`).style.stroke = 'rgba(255,255,255,0.08)';
      document.getElementById(`ring${i}`).style.strokeWidth = '1.5';
      document.getElementById(`pulse${i}`).style.stroke = 'rgba(255,255,255,0.2)';
    }

    for (let i = 0; i < arrows.length; i++) {
      const el = document.getElementById(arrows[i]);
      el.style.stroke = 'rgba(255,255,255,0.1)';
      el.classList.remove('active');
      document.getElementById(labels[i]).style.fill = 'rgba(255,255,255,0.15)';
      document.getElementById(labels[i]).classList.remove('active');
    }

    document.getElementById('arrowFill').setAttribute('fill', 'rgba(255,255,255,0.15)');

    if (empty) return;

    const c = STATE_COLORS[activeState];

    // Activate states 0..activeState
    for (let i = 0; i <= activeState; i++) {
      const sg = document.getElementById(`sg${i}`);
      sg.classList.add('active');
      document.getElementById(`bg${i}`).style.fill = i === activeState ? c.bg : 'rgba(255,255,255,0.05)';
      const ringColor = i === activeState ? c.stroke : 'rgba(255,255,255,0.2)';
      document.getElementById(`ring${i}`).style.stroke = ringColor;
      document.getElementById(`ring${i}`).style.strokeWidth = i === activeState ? '2.5' : '1.5';
      document.getElementById(`pulse${i}`).style.stroke = i === activeState ? c.pulse : 'rgba(255,255,255,0.15)';
    }

    // Activate arrows 0..activeState-1
    for (let i = 0; i < activeState; i++) {
      const el = document.getElementById(arrows[i]);
      el.style.stroke = c.arrow;
      el.classList.remove('active');
      void el.offsetWidth; // reflow
      el.classList.add('active');
      document.getElementById(labels[i]).style.fill = c.arrow;
      document.getElementById(labels[i]).classList.add('active');
    }

    document.getElementById('arrowFill').setAttribute('fill', c.arrow);
  }

  function copyPassword() {
    const pwd = document.getElementById('passwordInput').value;
    if (!pwd) return;
    navigator.clipboard.writeText(pwd).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('success');
      btn.textContent = 'Copied!';
      setTimeout(() => {
        btn.classList.remove('success');
        btn.textContent = 'Copy Password';
      }, 1800);
    });
  }

  function generatePassword() {
    const upper   = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const lower   = 'abcdefghjkmnpqrstuvwxyz';
    const digits  = '23456789';
    const symbols = '!@#$%^&*-_+=?';
    const all     = upper + lower + digits + symbols;
    let pwd = '';
    pwd += upper[Math.floor(Math.random() * upper.length)];
    pwd += lower[Math.floor(Math.random() * lower.length)];
    pwd += digits[Math.floor(Math.random() * digits.length)];
    pwd += symbols[Math.floor(Math.random() * symbols.length)];
    for (let i = 4; i < 14; i++) {
      pwd += all[Math.floor(Math.random() * all.length)];
    }
    // Shuffle
    pwd = pwd.split('').sort(() => Math.random() - 0.5).join('');
    const input = document.getElementById('passwordInput');
    input.value = pwd;
    input.type = 'text';
    visible = true;
    document.getElementById('eyeBtn').textContent = '🙈';
    analyze();
  }
</script>
</body>
